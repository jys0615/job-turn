spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:jobturn}
    username: ${DB_USER:jobturn}
    password: ${DB_PASSWORD:jobturn}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:jobturn-default-secret-key-for-local-dev-only}
  access-expiration: 3600000    # 1h
  refresh-expiration: 604800000 # 7d

ai-service:
  url: ${AI_SERVICE_URL:http://localhost:8000}

saramin:
  api-key: ${SARAMIN_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      access: unrestricted

springdoc:
  swagger-ui:
    path: /swagger-ui.html
