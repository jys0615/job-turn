version: '3.9'

# 개발 환경용 — 인프라(DB, 캐시, 벡터DB)만 실행
# 앱(backend, ai-service)은 로컬에서 직접 실행
#
# 실행: docker-compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: jobturn-postgres
    environment:
      POSTGRES_DB: jobturn
      POSTGRES_USER: jobturn
      POSTGRES_PASSWORD: jobturn
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - jobturn-net

  redis:
    image: redis:7-alpine
    container_name: jobturn-redis
    ports:
      - "6379:6379"
    networks:
      - jobturn-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: jobturn-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - jobturn-net

volumes:
  postgres-data:
  qdrant-data:

networks:
  jobturn-net:
    driver: bridge
